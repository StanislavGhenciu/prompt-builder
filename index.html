<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Prompt Builder</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f2ee;
    --surface: #ffffff;
    --border: #e0d9d0;
    --accent: #2d6a4f;
    --accent2: #e76f51;
    --text: #1a1a1a;
    --muted: #9a9080;
    --done: #eae5df;
    --tag-bg: #eaf3ef;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 20px 80px;
  }

  header {
    text-align: center;
    margin-bottom: 50px;
    animation: fadeDown 0.6s ease both;
  }

  header h1 {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: clamp(2rem, 6vw, 3.5rem);
    letter-spacing: -0.03em;
    line-height: 1;
    color: var(--text);
  }

  header h1 span { color: var(--accent); }

  header p {
    margin-top: 12px;
    color: var(--muted);
    font-size: 0.85rem;
    letter-spacing: 0.05em;
  }

  .progress-bar {
    width: 100%;
    max-width: 560px;
    height: 3px;
    background: var(--border);
    margin-bottom: 40px;
    border-radius: 2px;
    overflow: hidden;
    animation: fadeIn 0.6s 0.2s ease both;
  }

  .progress-fill {
    height: 100%;
    background: var(--accent);
    width: 0%;
    transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .step-counter {
    font-size: 0.75rem;
    color: var(--muted);
    text-align: center;
    margin-bottom: 30px;
    letter-spacing: 0.1em;
    animation: fadeIn 0.6s 0.3s ease both;
  }

  .step-counter span { color: var(--accent); font-weight: 700; }

  .card {
    width: 100%;
    max-width: 560px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 36px;
    animation: slideUp 0.4s ease both;
    box-shadow: 0 4px 24px rgba(0,0,0,0.06);
  }

  .question-number {
    font-size: 0.7rem;
    letter-spacing: 0.15em;
    color: var(--accent);
    margin-bottom: 10px;
    text-transform: uppercase;
    font-weight: 700;
  }

  .question-text {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: clamp(1.2rem, 3vw, 1.6rem);
    line-height: 1.3;
    margin-bottom: 8px;
    color: var(--text);
  }

  .question-hint {
    font-size: 0.78rem;
    color: var(--muted);
    margin-bottom: 28px;
    line-height: 1.6;
  }

  .question-hint em {
    color: #b0a898;
    font-style: normal;
    display: block;
    margin-top: 4px;
  }

  .options-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 20px;
  }

  .option-btn {
    background: var(--bg);
    border: 1.5px solid var(--border);
    color: var(--text);
    padding: 12px 16px;
    border-radius: 12px;
    font-family: 'DM Mono', monospace;
    font-size: 0.82rem;
    cursor: pointer;
    transition: all 0.15s ease;
    text-align: left;
  }

  .option-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
    background: var(--tag-bg);
  }

  .option-btn.selected {
    border-color: var(--accent);
    background: var(--tag-bg);
    color: var(--accent);
  }

  .input-field {
    width: 100%;
    background: var(--bg);
    border: 1.5px solid var(--border);
    color: var(--text);
    padding: 16px 18px;
    border-radius: 12px;
    font-family: 'DM Mono', monospace;
    font-size: 0.9rem;
    outline: none;
    transition: border-color 0.2s ease;
    resize: none;
  }

  .input-field:focus { border-color: var(--accent); }
  .input-field::placeholder { color: var(--muted); }

  .btn-next {
    width: 100%;
    margin-top: 20px;
    padding: 16px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 12px;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 1rem;
    cursor: pointer;
    letter-spacing: 0.02em;
    transition: all 0.2s ease;
  }

  .btn-next:hover {
    background: #235c42;
    transform: translateY(-1px);
    box-shadow: 0 4px 16px rgba(45,106,79,0.25);
  }

  .btn-next:active { transform: translateY(0); }

  .btn-next:disabled {
    background: var(--border);
    color: var(--muted);
    cursor: not-allowed;
    transform: none;
    box-shadow: none;
  }

  /* RESULT */
  .result-card {
    width: 100%;
    max-width: 560px;
    display: none;
    animation: slideUp 0.5s ease both;
  }

  .result-label {
    font-size: 0.7rem;
    letter-spacing: 0.15em;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 16px;
    text-align: center;
    font-weight: 700;
  }

  .prompt-box {
    background: var(--surface);
    border: 1.5px solid var(--accent);
    border-radius: 20px;
    padding: 28px;
    font-size: 0.9rem;
    line-height: 2;
    color: var(--text);
    margin-bottom: 16px;
    box-shadow: 0 4px 24px rgba(45,106,79,0.08);
  }

  .prompt-box .bracket {
    color: var(--accent);
    font-weight: 700;
  }

  .prompt-plain { display: none; }

  .btn-copy {
    width: 100%;
    padding: 16px;
    background: transparent;
    color: var(--accent);
    border: 1.5px solid var(--accent);
    border-radius: 12px;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 1rem;
    cursor: pointer;
    transition: all 0.2s ease;
    margin-bottom: 12px;
    letter-spacing: 0.02em;
  }

  .btn-copy:hover { background: var(--tag-bg); }

  .btn-copy.copied {
    color: #fff;
    background: var(--accent);
    border-color: var(--accent);
  }

  .btn-restart {
    width: 100%;
    padding: 14px;
    background: transparent;
    color: var(--muted);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    font-family: 'DM Mono', monospace;
    font-size: 0.85rem;
    cursor: pointer;
    transition: all 0.2s ease;
  }

  .btn-restart:hover { color: var(--text); border-color: #c0b8b0; }

  .summary-pills {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 20px;
  }

  .pill {
    background: var(--done);
    border-radius: 20px;
    padding: 6px 14px;
    font-size: 0.75rem;
    color: var(--muted);
  }

  .pill span { color: var(--text); }

  .or-divider {
    text-align: center;
    color: var(--muted);
    font-size: 0.75rem;
    margin: 12px 0 10px;
    letter-spacing: 0.1em;
  }

  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(24px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @media (max-width: 480px) {
    .options-grid { grid-template-columns: 1fr; }
    .card { padding: 24px; }
  }
</style>
</head>
<body>

<header>
  <h1>AI <span>Prompt</span> Builder</h1>
  <p>7 questions → your perfect prompt</p>
</header>

<div class="progress-bar">
  <div class="progress-fill" id="progressFill"></div>
</div>

<div class="step-counter" id="stepCounter">
  Step <span id="currentStep">1</span> of <span>7</span>
</div>

<div class="card" id="questionCard">
  <div class="question-number" id="qNumber">QUESTION 01</div>
  <div class="question-text" id="qText"></div>
  <div class="question-hint" id="qHint"></div>
  <div id="qOptions"></div>
  <button class="btn-next" id="btnNext" onclick="nextStep()">Continue →</button>
</div>

<div class="result-card" id="resultCard">
  <div class="result-label">✦ Your Prompt</div>
  <div class="summary-pills" id="summaryPills"></div>
  <div class="prompt-box" id="promptBox"></div>
  <div class="prompt-plain" id="promptPlain"></div>
  <button class="btn-copy" id="btnCopy" onclick="copyPrompt()">Copy prompt</button>
  <button class="btn-restart" onclick="restart()">← Start over</button>
</div>

<script>
const questions = [
  {
    number: "01",
    text: "What type of image do you want?",
    hint: "The base visual style of the image.",
    hint2: "e.g. realistic photo, cinematic film still, digital illustration, 3D render",
    type: "options+text",
    options: ["Realistic photo", "Cinematic film still", "Digital illustration", "3D render", "Animation / cartoon", "Oil painting"]
  },
  {
    number: "02",
    text: "Who or what is in the image?",
    hint: "The main subject. Be specific: age, appearance, details.",
    hint2: "e.g. a 30-year-old woman with red hair, an abandoned robot, a black sports car",
    type: "text",
    placeholder: "Describe the subject..."
  },
  {
    number: "03",
    text: "What is the subject doing?",
    hint: "The action or state. If nothing — describe the expression or posture.",
    hint2: "e.g. running through rain, gazing into the distance, holding a book",
    type: "text",
    placeholder: "Describe the action or posture..."
  },
  {
    number: "04",
    text: "Where is it? What's the background?",
    hint: "Location, environment, context. The more specific, the better.",
    hint2: "e.g. Tokyo at night, dark forest, white minimalist studio, desert at sunset",
    type: "text",
    placeholder: "Describe the location and background..."
  },
  {
    number: "05",
    text: "What mood and atmosphere do you want?",
    hint: "How should the image feel emotionally and visually.",
    hint2: "e.g. dark and mysterious, warm and nostalgic, cyberpunk neon, epic cinematic",
    type: "options+text",
    options: ["Dark / mysterious", "Warm / nostalgic", "Epic / dramatic", "Minimalist / clean", "Cyberpunk / neon", "Natural / organic"]
  },
  {
    number: "06",
    text: "Camera and lighting details",
    hint: "Optional but important. Choose what fits your style.",
    hint2: "Leave blank if unsure — standard settings will be added.",
    type: "options+text",
    options: ["85mm portrait lens", "35mm wide angle", "Golden hour lighting", "Low-key / dramatic shadows", "High-key / bright studio", "Kodak Portra 400 film"]
  },
  {
    number: "07",
    text: "What camera was used to shoot this?",
    hint: "Adds cinematic realism to your prompt.",
    hint2: "e.g. Sony Venice, Red Komodo, ARRI Alexa, Canon 5D, iPhone 15 Pro",
    type: "options+text",
    options: ["Sony Venice", "ARRI Alexa Mini", "Red Komodo", "Canon EOS R5", "Hasselblad H6D", "iPhone 15 Pro"]
  }
];

const totalSteps = questions.length;
let currentStep = 0;
let answers = [];
let selectedOption = "";

function renderQuestion() {
  const q = questions[currentStep];
  document.getElementById("qNumber").textContent = "QUESTION " + q.number;
  document.getElementById("qText").textContent = q.text;
  document.getElementById("qHint").innerHTML = q.hint + (q.hint2 ? `<em>${q.hint2}</em>` : "");
  document.getElementById("currentStep").textContent = currentStep + 1;
  document.getElementById("progressFill").style.width = ((currentStep) / totalSteps * 100) + "%";

  selectedOption = "";
  const optionsDiv = document.getElementById("qOptions");
  optionsDiv.innerHTML = "";

  if (q.type === "options+text") {
    const grid = document.createElement("div");
    grid.className = "options-grid";
    q.options.forEach(opt => {
      const btn = document.createElement("button");
      btn.className = "option-btn";
      btn.textContent = opt;
      btn.onclick = () => {
        document.querySelectorAll(".option-btn").forEach(b => b.classList.remove("selected"));
        btn.classList.add("selected");
        selectedOption = opt;
        const inp = document.getElementById("textInput");
        if (inp) inp.value = "";
        document.getElementById("btnNext").disabled = false;
      };
      grid.appendChild(btn);
    });
    optionsDiv.appendChild(grid);

    const orDiv = document.createElement("div");
    orDiv.className = "or-divider";
    orDiv.textContent = "— or type your own —";
    optionsDiv.appendChild(orDiv);
  }

  const textarea = document.createElement("textarea");
  textarea.className = "input-field";
  textarea.id = "textInput";
  textarea.rows = 2;
  textarea.placeholder = q.placeholder || "Or type your own...";
  textarea.oninput = () => {
    if (textarea.value.trim()) {
      document.querySelectorAll(".option-btn").forEach(b => b.classList.remove("selected"));
      selectedOption = "";
      document.getElementById("btnNext").disabled = false;
    } else if (!selectedOption) {
      document.getElementById("btnNext").disabled = true;
    }
  };
  optionsDiv.appendChild(textarea);

  document.getElementById("btnNext").disabled = true;

  const card = document.getElementById("questionCard");
  card.style.animation = "none";
  card.offsetHeight;
  card.style.animation = "slideUp 0.35s ease both";
}

function nextStep() {
  const textInput = document.getElementById("textInput");
  const value = (textInput && textInput.value.trim()) ? textInput.value.trim() : selectedOption;
  if (!value) return;
  answers[currentStep] = value;
  currentStep++;

  if (currentStep >= totalSteps) {
    showResult();
  } else {
    renderQuestion();
  }
}

function showResult() {
  document.getElementById("questionCard").style.display = "none";
  document.getElementById("stepCounter").style.display = "none";
  document.getElementById("progressFill").style.width = "100%";

  const labels = ["Type", "Subject", "Action", "Location", "Mood", "Camera & Light", "Camera"];
  const pillsDiv = document.getElementById("summaryPills");
  pillsDiv.innerHTML = "";
  answers.forEach((a, i) => {
    const pill = document.createElement("div");
    pill.className = "pill";
    pill.innerHTML = `${labels[i]}: <span>${a}</span>`;
    pillsDiv.appendChild(pill);
  });

  // Build prompt with square brackets
  const parts = [
    answers[0],
    answers[1],
    answers[2],
    answers[3],
    answers[4] + " mood",
    answers[5] || "sharp focus, professional lighting",
    "shot on " + (answers[6] || "Sony Venice")
  ];

  // Plain text version for clipboard
  const plainText = parts.map(p => `[${p}]`).join(", ");
  document.getElementById("promptPlain").textContent = plainText;

  // Visual version
  const promptBox = document.getElementById("promptBox");
  promptBox.innerHTML = parts.map(p =>
    `<span class="bracket">[</span>${p}<span class="bracket">]</span>`
  ).join(", ");

  const result = document.getElementById("resultCard");
  result.style.display = "block";
  result.style.animation = "none";
  result.offsetHeight;
  result.style.animation = "slideUp 0.5s ease both";
}

function copyPrompt() {
  const text = document.getElementById("promptPlain").textContent;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById("btnCopy");
    btn.textContent = "✓ Copied!";
    btn.classList.add("copied");
    setTimeout(() => {
      btn.textContent = "Copy prompt";
      btn.classList.remove("copied");
    }, 2000);
  });
}

function restart() {
  currentStep = 0;
  answers = [];
  selectedOption = "";
  document.getElementById("resultCard").style.display = "none";
  document.getElementById("questionCard").style.display = "block";
  document.getElementById("stepCounter").style.display = "block";
  renderQuestion();
}

renderQuestion();
</script>
</body>
</html>
